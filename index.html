<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Fluffy | 京都京北の猫カフェ</title>
  <meta name="description" content="京都京北の自然に囲まれた猫カフェ。黒猫じったんと癒しの時間を。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:300;400&family=Zen+Kaku+Gothic+New:300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav aria-label="メインナビゲーション">
    <a class="logo" href="#">Cafe <span>Fluffy</span></a>
    <a class="reserve-btn" href="#reserve">予約する</a>
  </nav>
</header>

<main>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>

  <div class="hero-inner">
    <p class="hero-eyebrow">京都 京北 / Cat Café</p>
    <h1>Cafe<br><em>Fluffy</em></h1>
    <p class="hero-sub">黒猫じったんと仲間たちが、森の中でお待ちしています。</p>
    <a class="cta-primary" href="#reserve">ご予約はこちら</a>
  </div>

  <div class="scroll-hint">scroll</div>
</section>

<section class="section-white">
  <div class="concept">
    <div class="concept-visual">
      <img src="IMG_7199.jpeg" alt="黒猫じったん" class="concept-img">
    </div>

    <div>
      <p class="section-label">Our Concept</p>
      <h2 class="section-title">自然と猫と、<br><em>ほっとする場所</em></h2>
      <p class="section-body">
        京都市内から車で約50分。京北の豊かな自然に抱かれた一軒家カフェです。
      </p>
    </div>
  </div>
</section>

<section class="cats-section">
  <div class="inner">
    <p class="section-label">Our Cats</p>
    <h2 class="section-title">在籍猫の<em>紹介</em></h2>

    <div class="cats-grid">
      <div class="cat-card main">
        <span class="cat-badge">看板猫</span>
        <span class="emoji">🐈‍⬛</span>
        <h3>じったん</h3>
        <p>真っ黒でふわふわ。Cafe Fluffyの顔。</p>
      </div>
    </div>
  </div>
</section>

<section id="reserve" class="cta-band">
  <h2>会いに来てください</h2>
  <a href="tel:0000-00-0000">予約する</a>
</section>

</main>

<footer>
  <strong>Cafe Fluffy</strong> © 2026
</footer>

<!-- 追従ボタン -->
<a href="#reserve" class="floating-reserve">予約</a>

</body>
</html>
